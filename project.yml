name: GitchatIOS
options:
  bundleIdPrefix: git
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en
schemes:
  GitchatIOS:
    build:
      targets:
        GitchatIOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
settings:
  base:
    DEVELOPMENT_TEAM: 9S5F8693FB
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.0"
  OneSignalXCFramework:
    url: https://github.com/OneSignal/OneSignal-XCFramework
    from: "5.2.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  FacebookSDK:
    url: https://github.com/facebook/facebook-ios-sdk
    from: "17.0.0"
  AppsFlyerFramework:
    url: https://github.com/AppsFlyerSDK/AppsFlyerFramework
    from: "6.14.0"
targets:
  GitchatIOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GitchatIOS
    resources:
      - path: GitchatIOS/Resources/Assets.xcassets
      - path: GitchatIOS/Resources/Fonts
    dependencies:
      - package: SocketIO
        product: SocketIO
      - package: OneSignalXCFramework
        product: OneSignalFramework
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - package: FacebookSDK
        product: FacebookCore
      - package: AppsFlyerFramework
        product: AppsFlyerLib
      - target: OneSignalNotificationServiceExtension
        embed: true
        codeSign: true
        platformFilter: iOS
      - target: GitchatShareExtension
        embed: true
        codeSign: true
        platformFilter: iOS
    entitlements:
      path: GitchatIOS/GitchatIOS.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
        com.apple.developer.usernotifications.communication: true
        com.apple.developer.associated-domains:
          - applinks:gitchat.sh
          - applinks:dev.gitchat.sh
        com.apple.security.application-groups:
          - group.chat.git.onesignal
          - group.chat.git.share
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    info:
      path: GitchatIOS/Info.plist
      properties:
        CFBundleDisplayName: Gitchat
        CFBundleName: Gitchat
        CFBundleShortVersionString: "1.0.4"
        CFBundleVersion: "68"
        UILaunchScreen:
          UIColorName: AccentColor
          UIImageName: LaunchIcon
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: Gitchat needs camera access to attach photos to messages.
        NSPhotoLibraryUsageDescription: Gitchat needs photo library access to attach images to messages.
        NSPhotoLibraryAddUsageDescription: Gitchat needs permission to save images from chats to your Photos library.
        NSMicrophoneUsageDescription: Gitchat needs microphone access for voice messages.
        ITSAppUsesNonExemptEncryption: false
        FacebookAppID: "1492200602416732"
        FacebookClientToken: "07adfc78a5e324b84a05e8a2553e105d"
        FacebookDisplayName: Gitchat
        FacebookAutoLogAppEventsEnabled: true
        FacebookAdvertiserIDCollectionEnabled: true
        LSApplicationCategoryType: public.app-category.social-networking
        UIAppFonts:
          - Geist-Regular.ttf
          - Geist-SemiBold.ttf
          - Geist-Bold.ttf
          - Geist-Black.ttf
        LSApplicationQueriesSchemes:
          - https
          - github
          - fbapi
          - fb-messenger-share-api
          - fbauth2
          - fbshareextension
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - fb1492200602416732
          - CFBundleURLName: chat.git.invite
            CFBundleURLSchemes:
              - gitchat
        NSUserActivityTypes:
          - INSendMessageIntent
    settings:
      base:
        PRODUCT_NAME: Gitchat
        PRODUCT_BUNDLE_IDENTIFIER: chat.git
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9S5F8693FB
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: GitchatIOS/Info.plist
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
  OneSignalNotificationServiceExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: OneSignalNotificationServiceExtension
      - path: GitchatIOS/Core/MutedConversationsStore.swift
    dependencies:
      - package: OneSignalXCFramework
        product: OneSignalExtension
      - sdk: Intents.framework
    info:
      path: OneSignalNotificationServiceExtension/Info.plist
      properties:
        CFBundleDisplayName: OneSignalNotificationServiceExtension
        CFBundleShortVersionString: "1.0.4"
        CFBundleVersion: "68"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    entitlements:
      path: OneSignalNotificationServiceExtension/OneSignalNotificationServiceExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.chat.git.onesignal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.git.OneSignalNotificationServiceExtension
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9S5F8693FB
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OneSignalNotificationServiceExtension/Info.plist
        SKIP_INSTALL: NO
  GitchatShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GitchatShareExtension
    resources:
      - path: GitchatIOS/Resources/Assets.xcassets
    entitlements:
      path: GitchatShareExtension/GitchatShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.chat.git.share
    info:
      path: GitchatShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Gitchat
        CFBundleName: Gitchat
        CFBundleShortVersionString: "1.0.4"
        CFBundleVersion: "68"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1
              NSExtensionActivationSupportsFileWithMaxCount: 5
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.git.share
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9S5F8693FB
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: GitchatShareExtension/Info.plist
        SKIP_INSTALL: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
