name: Notify Telegram on Pull Requests

on:
  pull_request:
    types: [opened, closed, reopened, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        with:
          script: |
            const event = context.eventName;
            const action = context.payload.action;

            // Skip bot-authored events to avoid feedback loops
            const sender = context.payload.sender || {};
            if (sender.type === 'Bot') return;

            const pr = context.payload.pull_request;
            if (!pr) return;

            const repo = context.payload.repository?.full_name || '';
            const num = pr.number;
            const title = pr.title || '';
            const url = pr.html_url || '';
            const author = pr.user?.login || 'someone';
            const baseBranch = pr.base?.ref || '';
            const headBranch = pr.head?.ref || '';
            const isDraft = !!pr.draft;
            const additions = pr.additions ?? 0;
            const deletions = pr.deletions ?? 0;
            const changed = pr.changed_files ?? 0;
            const labels = (pr.labels || []).map(l => l.name).filter(Boolean);
            const assignees = (pr.assignees || []).map(a => a.login).filter(Boolean);
            const reviewers = (pr.requested_reviewers || []).map(r => r.login).filter(Boolean);

            const esc = (s) => String(s)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;');

            const userLink = (login) => `<a href="https://github.com/${esc(login)}">@${esc(login)}</a>`;
            const prLink = `<a href="${esc(url)}">#${num}</a>`;

            // Random fun footers
            const jokes = {
              opened: [
                "🍿 Fresh PR incoming — grab a review",
                "🛠️ Code carved, awaiting judgment",
                "🚀 Launch pad: review pending",
                "🎁 A PR has appeared, who opens it first?",
                "📬 You've got mail — diff inside",
                "🪄 May your diff be small and your tests green",
                "🧵 New thread of refactor energy",
              ],
              ready_for_review: [
                "🛎️ Ding ding — this PR is ready",
                "🎤 Mic's hot, reviewers please take the stage",
                "📣 Attention reviewers: work item served",
              ],
              closed_merged: [
                "🎉 Merged! Ship it, sail on",
                "🚢 Into main it goes — safe travels",
                "🧩 Another piece slotted into the puzzle",
                "✨ Merge commit sparkles",
                "🏁 And that's a wrap on this diff",
              ],
              closed_not_merged: [
                "🧊 PR cold-closed — better luck next diff",
                "🪦 Here lies a PR, rest in commits",
                "📕 Closed without merge — the cutting-room floor",
              ],
              reopened: [
                "🔁 Back from the dead — PR lives again",
                "♻️ Recycled for another round",
              ],
              review_requested: [
                "👀 Eyes requested on this PR",
                "🔍 Reviewer summoned",
                "✋ Raise your hand, a review is needed",
              ],
              review_approved: [
                "✅ LGTM rubber-stamp deployed",
                "👍 Approved — green light",
              ],
              review_changes_requested: [
                "📝 Changes requested — back to the drawing board",
                "🛑 Reviewer says: not yet",
              ],
              review_commented: [
                "💬 Reviewer left thoughts",
              ],
            };

            let header;
            let footerPool;
            let extra = '';

            if (event === 'pull_request') {
              if (action === 'opened') {
                header = isDraft
                  ? `📝 <b>DRAFT PR OPENED</b> 📝`
                  : `📦 <b>PR OPENED</b> 📦`;
                footerPool = jokes.opened;
              } else if (action === 'ready_for_review') {
                header = `🛎️ <b>PR READY FOR REVIEW</b> 🛎️`;
                footerPool = jokes.ready_for_review;
              } else if (action === 'closed') {
                if (pr.merged) {
                  header = `🎉 <b>PR MERGED</b> 🎉`;
                  footerPool = jokes.closed_merged;
                } else {
                  header = `🚫 <b>PR CLOSED</b> 🚫`;
                  footerPool = jokes.closed_not_merged;
                }
              } else if (action === 'reopened') {
                header = `🔁 <b>PR REOPENED</b> 🔁`;
                footerPool = jokes.reopened;
              } else if (action === 'review_requested') {
                header = `👀 <b>REVIEW REQUESTED</b> 👀`;
                footerPool = jokes.review_requested;
              } else {
                return;
              }
            } else if (event === 'pull_request_review') {
              const review = context.payload.review;
              if (!review) return;
              const state = (review.state || '').toLowerCase();
              if (state === 'approved') {
                header = `✅ <b>PR APPROVED</b> ✅`;
                footerPool = jokes.review_approved;
              } else if (state === 'changes_requested') {
                header = `📝 <b>CHANGES REQUESTED</b> 📝`;
                footerPool = jokes.review_changes_requested;
              } else if (state === 'commented') {
                header = `💬 <b>REVIEW COMMENT</b> 💬`;
                footerPool = jokes.review_commented;
              } else {
                return;
              }
              const reviewer = review.user?.login;
              if (reviewer) extra = `🧑‍⚖️ ${userLink(reviewer)}\n`;
            } else {
              return;
            }

            const joke = footerPool[Math.floor(Math.random() * footerPool.length)];

            // Build body
            const lines = [];
            lines.push(`${header}`);
            lines.push(`📦 <a href="${esc('https://github.com/' + repo)}">${esc(repo)}</a>`);
            lines.push(`${prLink} · <b>${esc(title)}</b>`);
            lines.push(`🌿 <b>${esc(headBranch)}</b> → <b>${esc(baseBranch)}</b> · 👤 ${userLink(author)}`);
            if (extra) lines.push(extra.trimEnd());

            if (action === 'opened' || action === 'ready_for_review' || action === 'reopened') {
              const stat = `➕ ${additions} · ➖ ${deletions} · 📄 ${changed} files`;
              lines.push(stat);
            }

            if (labels.length) {
              lines.push(`🏷️ ${labels.map(l => esc(l)).join(', ')}`);
            }
            if (assignees.length) {
              lines.push(`👥 ${assignees.map(userLink).join(' ')}`);
            }
            if (reviewers.length && (action === 'opened' || action === 'review_requested' || action === 'ready_for_review')) {
              lines.push(`🔍 ${reviewers.map(userLink).join(' ')}`);
            }

            lines.push('');
            lines.push(`<i>${esc(joke)}</i>`);

            const text = lines.join('\n');

            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chat_id = process.env.CHAT_ID;
            const message_thread_id = process.env.THREAD_ID;

            if (!token || !chat_id) {
              core.setFailed('Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret');
              return;
            }

            const body = {
              chat_id,
              text,
              parse_mode: 'HTML',
              disable_web_page_preview: true,
            };
            if (message_thread_id) body.message_thread_id = Number(message_thread_id);

            const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            if (!res.ok) {
              const errText = await res.text();
              core.setFailed(`Telegram API ${res.status}: ${errText}`);
            }
